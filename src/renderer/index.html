<!doctype html>
<html lang="es" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'self'; script-src 'self'">
  <title>Pantoraya</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main class="shell">
    <header class="masthead">
      <span>Pantoraya</span><span class="separator">·</span><span>V.01.</span>
      <button class="theme-toggle" id="themeToggle" aria-label="Cambiar a modo claro" title="Cambiar a modo claro">
        <svg class="sun-icon" viewBox="0 0 20 20" aria-hidden="true">
          <circle cx="10" cy="10" r="3.2"></circle>
          <path d="M10 2v1.5M10 16.5V18M2 10h1.5M16.5 10H18M4.3 4.3l1.1 1.1M14.6 14.6l1.1 1.1M15.7 4.3l-1.1 1.1M5.4 14.6l-1.1 1.1"></path>
        </svg>
        <svg class="moon-icon" viewBox="0 0 20 20" aria-hidden="true">
          <path d="M16.2 12.8A6.7 6.7 0 0 1 7.2 3.8a6.7 6.7 0 1 0 9 9Z"></path>
        </svg>
      </button>
    </header>

    <section class="drop-zone" id="dropZone" tabindex="0" role="button" aria-label="Seleccionar un video">
      <strong id="dropTitle">Arrastra un video</strong>
      <span id="dropHint">o haz clic para abrir</span>
    </section>

    <section class="file-card hidden" id="fileCard">
      <div class="file-mark" aria-hidden="true"></div>
      <div class="file-copy">
        <strong id="fileName"></strong>
        <span id="fileSize"></span>
      </div>
      <button class="icon-button" id="removeButton" aria-label="Quitar video">×</button>
    </section>

    <section class="profiles" aria-label="Calidad del video">
      <div class="profile-grid" id="profileGrid">
        <button class="profile active" data-profile="quality">
          <strong>Original</strong><small>Misma resolución</small>
        </button>
        <button class="profile" data-profile="light">
          <strong>Liviano</strong><small>Menor tamaño · 720p</small>
        </button>
      </div>
    </section>

    <section class="progress hidden" id="progressPanel" aria-live="polite">
      <div class="progress-copy"><strong id="progressLabel">Preparando…</strong><span id="progressPercent">0%</span></div>
      <div class="track"><div id="progressBar"></div></div>
      <span id="progressTime"></span>
    </section>

    <section class="result hidden" id="resultPanel" aria-live="polite">
      <span class="check">✓</span>
      <div><strong>Listo</strong><span id="resultDetails"></span></div>
    </section>

    <p class="error hidden" id="errorMessage" role="alert"></p>

    <div class="actions">
      <button class="secondary hidden" id="cancelButton">Cancelar</button>
      <button class="primary" id="convertButton" disabled>Convertir</button>
      <button class="primary success hidden" id="revealButton">Mostrar en Finder</button>
    </div>
  </main>
  <script src="app.js"></script>
</body>
</html>
