<!doctype html>
<html lang="es" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; img-src 'self' data:; style-src 'self'; script-src 'self'">
  <title>Pantoraya</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="window-drag-region" aria-hidden="true"></div>
  <main class="shell">
    <header class="masthead">
      <span class="brand">Pantoraya</span>
      <nav class="converter-tabs" id="converterTabs" role="tablist" aria-label="Tipo de conversión">
        <button class="converter-tab active" id="mp4Tab" data-converter="mp4" role="tab" aria-selected="true">MP4 converter</button>
        <button class="converter-tab" id="mp3Tab" data-converter="mp3" role="tab" aria-selected="false">MP3 converter</button>
        <button class="converter-tab" id="jpgTab" data-converter="jpg" role="tab" aria-selected="false">JPG</button>
      </nav>
      <button class="theme-toggle" id="themeToggle" aria-label="Cambiar a modo claro" title="Cambiar a modo claro">
        <svg class="sun-icon" viewBox="0 0 20 20" aria-hidden="true">
          <circle cx="10" cy="10" r="3.2"></circle>
          <path d="M10 2v1.5M10 16.5V18M2 10h1.5M16.5 10H18M4.3 4.3l1.1 1.1M14.6 14.6l1.1 1.1M15.7 4.3l-1.1 1.1M5.4 14.6l-1.1 1.1"></path>
        </svg>
        <svg class="moon-icon" viewBox="0 0 20 20" aria-hidden="true">
          <path d="M16.2 12.8A6.7 6.7 0 0 1 7.2 3.8a6.7 6.7 0 1 0 9 9Z"></path>
        </svg>
      </button>
      <button class="language-toggle" id="languageToggle" aria-label="Cambiar a inglés" title="Cambiar a inglés">ES</button>
    </header>

    <section class="drop-zone" id="dropZone" tabindex="0" role="button" aria-label="Seleccionar un video">
      <strong id="dropTitle">Arrastra un video</strong>
      <span id="dropHint">o haz clic para abrir</span>
    </section>

    <section class="file-card hidden" id="fileCard">
      <img class="file-thumbnail hidden" id="fileThumbnail" alt="">
      <div class="file-mark" id="fileMark" data-format="MP4" aria-hidden="true"></div>
      <div class="file-copy">
        <strong id="fileName"></strong>
      </div>
      <div class="file-size"><small id="originalLabel">Original</small><strong id="fileSize"></strong></div>
      <button class="icon-button" id="removeButton" aria-label="Quitar video">×</button>
    </section>

    <section class="profiles" id="profilesSection" aria-label="Calidad del video">
      <div class="profile-grid" id="profileGrid"></div>
    </section>

    <section class="progress hidden" id="progressPanel" aria-live="polite">
      <div class="progress-copy"><strong id="progressLabel">Preparando…</strong><span id="progressPercent">0%</span></div>
      <div class="track"><div id="progressBar"></div></div>
      <span id="progressTime"></span>
    </section>

    <section class="result hidden" id="resultPanel" aria-live="polite">
      <span class="check">✓</span>
      <div><strong id="resultTitle">Listo</strong><span id="resultDetails"></span></div>
    </section>

    <p class="error hidden" id="errorMessage" role="alert"></p>

    <div class="actions">
      <button class="secondary hidden" id="cancelButton">Cancelar</button>
      <button class="primary" id="convertButton" disabled>Convertir a MP4</button>
      <button class="primary success hidden" id="revealButton">Mostrar en Finder</button>
    </div>
  </main>
  <script src="app.js"></script>
</body>
</html>
